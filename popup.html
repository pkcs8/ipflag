<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 300px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .card {
      padding: 20px 18px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .flag {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    .country {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 2px 0;
    }

    .rows {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .label {
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 10px;
      white-space: nowrap;
      padding-top: 1px;
      flex-shrink: 0;
    }

    .value {
      color: #c0c8ff;
      font-weight: 500;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: right;
      word-break: break-word;
    }

    .loading {
      color: #888;
      font-size: 13px;
      padding: 24px 0;
      text-align: center;
    }

    .refresh-btn {
      margin-top: 4px;
      width: 100%;
      padding: 7px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.13);
      color: #fff;
    }

    .settings-toggle {
      width: 100%;
      padding: 10px 18px;
      background: rgba(255,255,255,0.03);
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #666;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s, color 0.15s;
    }

    .settings-toggle:hover {
      background: rgba(255,255,255,0.07);
      color: #aaa;
    }

    .settings-arrow {
      font-size: 9px;
      color: #555;
    }

    .settings-panel {
      display: none;
      padding: 12px 18px 14px;
      background: rgba(0,0,0,0.25);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .settings-panel.open {
      display: block;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .settings-label {
      color: #666;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }

    .settings-select {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 5px;
      color: #c0c8ff;
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
    }

    .settings-select:focus {
      border-color: rgba(192,200,255,0.4);
    }

    .footer-bar {
      width: 100%;
      padding: 8px 18px;
      background: rgba(255,255,255,0.04);
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      font-size: 10px;
      color: #888;
      letter-spacing: 0.3px;
    }

    .title-bar {
      width: 100%;
      padding: 10px 18px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-bar-icon {
      font-size: 16px;
      line-height: 1;
    }

    .title-bar-text {
      font-size: 13px;
      font-weight: 600;
      color: #c0c8ff;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <span class="title-bar-icon">🌐</span>
    <span class="title-bar-text">IP Flag</span>
  </div>
  <div class="card" id="content">
    <div class="loading">Detecting location…</div>
  </div>
  <div id="settings-section"></div>
  <div class="footer-bar">Copyright &copy; 2026 XRPSCAN Pte. Ltd.</div>
  <script src="popup.js"></script>
</body>
</html>
