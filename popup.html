<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:                 #f5f5f7;
      --fg:                 #1a1a2e;
      --country:            #000000;
      --divider:            rgba(0,0,0,0.1);
      --label:              #999;
      --value:              #3a45aa;
      --loading:            #666;
      --btn-bg:             rgba(0,0,0,0.05);
      --btn-border:         rgba(0,0,0,0.12);
      --btn-fg:             #555;
      --btn-hover-bg:       rgba(0,0,0,0.1);
      --btn-hover-fg:       #000;
      --stoggle-bg:         rgba(0,0,0,0.02);
      --stoggle-border:     rgba(0,0,0,0.08);
      --stoggle-fg:         #999;
      --stoggle-hover-bg:   rgba(0,0,0,0.05);
      --stoggle-hover-fg:   #555;
      --sarrow:             #bbb;
      --panel-bg:           rgba(0,0,0,0.03);
      --panel-border:       rgba(0,0,0,0.06);
      --slabel:             #999;
      --select-bg:          rgba(0,0,0,0.04);
      --select-border:      rgba(0,0,0,0.14);
      --select-fg:          #3a45aa;
      --select-focus:       rgba(58,69,170,0.4);
      --footer-bg:          rgba(0,0,0,0.03);
      --footer-border:      rgba(0,0,0,0.08);
      --footer-fg:          #aaa;
      --titlebar-bg:        rgba(0,0,0,0.03);
      --titlebar-border:    rgba(0,0,0,0.08);
      --titlebar-text:      #3a45aa;
      --switch-track:       rgba(0,0,0,0.14);
      --switch-knob:        #bbb;
      --switch-track-on:    rgba(58,69,170,0.25);
      --switch-knob-on:     #3a45aa;
    }

    body.dark {
      --bg:                 #1a1a2e;
      --fg:                 #e0e0e0;
      --country:            #ffffff;
      --divider:            rgba(255,255,255,0.1);
      --label:              #666;
      --value:              #c0c8ff;
      --loading:            #888;
      --btn-bg:             rgba(255,255,255,0.07);
      --btn-border:         rgba(255,255,255,0.12);
      --btn-fg:             #aaa;
      --btn-hover-bg:       rgba(255,255,255,0.13);
      --btn-hover-fg:       #fff;
      --stoggle-bg:         rgba(255,255,255,0.03);
      --stoggle-border:     rgba(255,255,255,0.08);
      --stoggle-fg:         #666;
      --stoggle-hover-bg:   rgba(255,255,255,0.07);
      --stoggle-hover-fg:   #aaa;
      --sarrow:             #555;
      --panel-bg:           rgba(0,0,0,0.25);
      --panel-border:       rgba(255,255,255,0.06);
      --slabel:             #666;
      --select-bg:          rgba(255,255,255,0.07);
      --select-border:      rgba(255,255,255,0.14);
      --select-fg:          #c0c8ff;
      --select-focus:       rgba(192,200,255,0.4);
      --footer-bg:          rgba(255,255,255,0.04);
      --footer-border:      rgba(255,255,255,0.08);
      --footer-fg:          #888;
      --titlebar-bg:        rgba(255,255,255,0.04);
      --titlebar-border:    rgba(255,255,255,0.08);
      --titlebar-text:      #c0c8ff;
      --switch-track:       rgba(255,255,255,0.14);
      --switch-knob:        #888;
      --switch-track-on:    rgba(192,200,255,0.35);
      --switch-knob-on:     #c0c8ff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 300px;
      background: var(--bg);
      color: var(--fg);
      transition: background 0.2s, color 0.2s;
    }

    .title-bar {
      width: 100%;
      padding: 10px 18px;
      background: var(--titlebar-bg);
      border-bottom: 1px solid var(--titlebar-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-bar-icon {
      font-size: 16px;
      line-height: 1;
    }

    .title-bar-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--titlebar-text);
      letter-spacing: 0.5px;
    }

    .card {
      padding: 20px 18px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .flag {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    .country {
      font-size: 16px;
      font-weight: 600;
      color: var(--country);
      letter-spacing: 0.3px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--divider);
      margin: 2px 0;
    }

    .rows {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .label {
      color: var(--label);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 10px;
      white-space: nowrap;
      padding-top: 1px;
      flex-shrink: 0;
    }

    .value {
      color: var(--value);
      font-weight: 500;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: right;
      word-break: break-word;
    }

    .loading {
      color: var(--loading);
      font-size: 13px;
      padding: 24px 0;
      text-align: center;
    }

    .refresh-btn {
      margin-top: 4px;
      width: 100%;
      padding: 7px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 6px;
      color: var(--btn-fg);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .refresh-btn:hover {
      background: var(--btn-hover-bg);
      color: var(--btn-hover-fg);
    }

    .settings-toggle {
      width: 100%;
      padding: 10px 18px;
      background: var(--stoggle-bg);
      border: none;
      border-top: 1px solid var(--stoggle-border);
      color: var(--stoggle-fg);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s, color 0.15s;
    }

    .settings-toggle:hover {
      background: var(--stoggle-hover-bg);
      color: var(--stoggle-hover-fg);
    }

    .settings-arrow {
      font-size: 9px;
      color: var(--sarrow);
    }

    .settings-panel {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 12px 18px 14px;
      background: var(--panel-bg);
      border-top: 1px solid var(--panel-border);
    }

    .settings-panel.open {
      display: flex;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .settings-label {
      color: var(--slabel);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }

    .settings-select {
      background: var(--select-bg);
      border: 1px solid var(--select-border);
      border-radius: 5px;
      color: var(--select-fg);
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
    }

    .settings-select:focus {
      border-color: var(--select-focus);
    }

    .theme-switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 18px;
      flex-shrink: 0;
    }

    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .theme-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--switch-track);
      border-radius: 18px;
      transition: background 0.2s;
    }

    .theme-slider::before {
      content: "";
      position: absolute;
      height: 12px;
      width: 12px;
      left: 3px;
      bottom: 3px;
      background: var(--switch-knob);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .theme-slider {
      background: var(--switch-track-on);
    }

    input:checked + .theme-slider::before {
      transform: translateX(16px);
      background: var(--switch-knob-on);
    }

    .footer-bar {
      width: 100%;
      padding: 8px 18px;
      background: var(--footer-bg);
      border-top: 1px solid var(--footer-border);
      text-align: center;
      font-size: 10px;
      color: var(--footer-fg);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <span class="title-bar-icon">🌐</span>
    <span class="title-bar-text">IP Flag</span>
  </div>
  <div class="card" id="content">
    <div class="loading">Detecting location…</div>
  </div>
  <div id="settings-section"></div>
  <div class="footer-bar">Copyright &copy; 2026 XRPSCAN Pte. Ltd.</div>
  <script src="popup.js"></script>
</body>
</html>
