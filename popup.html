<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 220px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .card {
      padding: 20px 18px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .flag {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    .country {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 4px 0;
    }

    .row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .label {
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 10px;
    }

    .value {
      color: #c0c8ff;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .loading {
      color: #888;
      font-size: 13px;
      padding: 24px 0;
    }

    .refresh-btn {
      margin-top: 6px;
      width: 100%;
      padding: 7px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.13);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card" id="content">
    <div class="loading">Detecting location…</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
